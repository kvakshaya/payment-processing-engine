apiVersion: v1
kind: Secret
metadata:
  name: payment-engine-secret
  namespace: payment-engine
type: Opaque
# Values are base64 encoded:
# echo -n 'payment_user' | base64   -> cGF5bWVudF91c2Vy
# echo -n 'payment_pass' | base64   -> cGF5bWVudF9wYXNz
# echo -n 'paymentdb'    | base64   -> cGF5bWVudGRi
# echo -n 'local-dev-secret-change-in-prod-256bit' | base64 -> bG9jYWwtZGV2LXNlY3JldC1jaGFuZ2UtaW4tcHJvZC0yNTZiaXQ=
data:
  DB_USERNAME: cGF5bWVudF91c2Vy
  DB_PASSWORD: cGF5bWVudF9wYXNz
  POSTGRES_USER: cGF5bWVudF91c2Vy
  POSTGRES_PASSWORD: cGF5bWVudF9wYXNz
  JWT_SECRET: bG9jYWwtZGV2LXNlY3JldC1jaGFuZ2UtaW4tcHJvZC0yNTZiaXQ=

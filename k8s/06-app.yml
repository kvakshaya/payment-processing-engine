apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-engine
  namespace: payment-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-engine
  template:
    metadata:
      labels:
        app: payment-engine
    spec:
      containers:
        - name: payment-engine
          image: payment-engine:latest
          # For Minikube: build with `eval $(minikube docker-env)` then `docker build -t payment-engine:latest .`
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-engine-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-engine-secret
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: payment-engine-config
                  key: REDIS_HOST
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: payment-engine-config
                  key: KAFKA_SERVERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-engine-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-engine-service
  namespace: payment-engine
spec:
  selector:
    app: payment-engine
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
